name: Build Multi-Arch Binary and Docker

on:
  workflow_dispatch: # 允许在 GitHub 页面手动点击触发

env:
  PROJECT: wzfilemanager
  CUSTOM_VERSION: "1.0.0"

jobs:
  # 任务 1：编译 Linux 多架构二进制文件
  build-linux-binary:
    runs-on: Debian-8
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
          - arch: arm64
            platform: linux/arm64
          - arch: armv7
            platform: linux/arm/v7
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Compile binary in Ubuntu 22.04
        timeout-minutes: 30
        run: |
          echo "使用 Ubuntu 22.04 容器编译 ${{ matrix.arch }} 架构的二进制文件..."
          docker run --rm --platform ${{ matrix.platform }} -e DEBIAN_FRONTEND=noninteractive -v ${{ github.workspace }}:/work -w /work ubuntu:22.04 bash -c "
            set -e
            # 清理缓存并加入重试机制，防止 ARM 架构下 apt-get update 偶发失败
            rm -rf /var/lib/apt/lists/*
            apt-get update || (sleep 5 && apt-get update) || (sleep 10 && apt-get update)
            
            # 启用 universe 和 multiverse 源，确保能装上 p7zip-full
            sed -i 's/^# deb/deb/' /etc/apt/sources.list || true
            apt-get update || true
            
            # 【关键修复】仅 amd64 架构安装 rar 包，arm64/armv7 跳过
            RAR_PKG=''
            if [ '${{ matrix.arch }}' = 'amd64' ]; then
              RAR_PKG='rar'
            fi
            
            # 安装基础环境及压缩工具，补全二进制运行必须的底层 C/C++ 运行库
            apt-get install -y python3 python3-pip python3-venv zip tar p7zip-full unrar \$RAR_PKG curl build-essential libffi-dev libssl-dev libc6 libgcc-s1 libstdc++6 zlib1g
            
            python3 -m venv venv
            source venv/bin/activate
            
            pip3 install --upgrade pip
            pip3 install --prefer-binary -r requirements.txt
            pip3 install --prefer-binary paramiko pyinstaller
            
            pyinstaller --onefile --add-data 'web:web' --add-data 'core:core' --add-data 'config.json:.' main.py
            
            mv dist/main wzfilemanager-linux-${{ matrix.arch }}
            chmod +x wzfilemanager-linux-${{ matrix.arch }}
          "

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-linux-${{ matrix.arch }}
          path: wzfilemanager-linux-${{ matrix.arch }}

  # 任务 2：编译 Windows (Win7/Win10, 32位/64位)
  build-windows-exe:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: win32
            python-arch: x86
          - arch: win64
            python-arch: x64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.8
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'
          architecture: ${{ matrix.python-arch }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --prefer-binary -r requirements.txt
          pip install --prefer-binary paramiko pyinstaller

      - name: Build .exe with PyInstaller
        run: |
          pyinstaller --onefile --add-data "web;web" --add-data "core;core" --add-data "config.json;." main.py
          mv dist/main.exe wzfilemanager-windows-${{ matrix.arch }}.exe

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-windows-${{ matrix.arch }}
          path: wzfilemanager-windows-${{ matrix.arch }}.exe

  # 任务 3：编译 macOS (仅 Apple Silicon M1/M2)
  build-macos-binary:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --prefer-binary -r requirements.txt
          pip install --prefer-binary paramiko pyinstaller

      - name: Build macOS binary with PyInstaller
        run: |
          pyinstaller --onefile --add-data="web:web" --add-data="core:core" --add-data="config.json:." main.py
          mv dist/main wzfilemanager-macos-arm64
          chmod +x wzfilemanager-macos-arm64

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-macos-arm64
          path: wzfilemanager-macos-arm64

  # 任务 4：分别打包 3 个独立架构的 Docker 镜像
  build-single-arch-docker:
    needs: [build-linux-binary]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
          - arch: arm64
            platform: linux/arm64
          - arch: armv7
            platform: linux/arm/v7
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: binary-linux-${{ matrix.arch }}
          path: binaries

      - name: Prepare Docker context
        run: |
          cat << 'EOF' > binaries/Dockerfile
          FROM ubuntu:22.04
          ENV TZ=Asia/Shanghai
          ENV DEBIAN_FRONTEND=noninteractive
          WORKDIR /opt/wzfilemanager

          # 启用 universe 和 multiverse 源，并为备用下载准备 wget 和 xz-utils
          RUN sed -i 's/^# deb/deb/' /etc/apt/sources.list || true && \
              apt-get update && \
              apt-get install -y --no-install-recommends \
              wget xz-utils zip tar openssh-client bash tzdata \
              libc6 libgcc-s1 libstdc++6 libffi8 libssl3 zlib1g && \
              \
              # 1. 安装 7z: apt 优先，失败则从 GitHub 下载官方全架构预编译包
              (apt-get install -y --no-install-recommends p7zip-full || ( \
                  echo "⚠️ apt 安装 p7zip-full 失败，尝试从 GitHub 下载..."; \
                  ARCH=$(dpkg --print-architecture); \
                  if [ "$ARCH" = "amd64" ]; then SEVENZ_URL="https://github.com/ip7z/7zip/releases/download/24.08/7z2408-linux-x64.tar.xz"; \
                  elif [ "$ARCH" = "arm64" ]; then SEVENZ_URL="https://github.com/ip7z/7zip/releases/download/24.08/7z2408-linux-arm64.tar.xz"; \
                  elif [ "$ARCH" = "armhf" ]; then SEVENZ_URL="https://github.com/ip7z/7zip/releases/download/24.08/7z2408-linux-arm.tar.xz"; \
                  else SEVENZ_URL=""; fi; \
                  if [ -n "$SEVENZ_URL" ]; then \
                      wget --no-check-certificate -q -O /tmp/7z.tar.xz "$SEVENZ_URL" && \
                      mkdir -p /tmp/7z && tar -xf /tmp/7z.tar.xz -C /tmp/7z && \
                      cp /tmp/7z/7zzs /usr/local/bin/7z && chmod +x /usr/local/bin/7z && \
                      rm -rf /tmp/7z*; \
                  fi \
              ) || true) && \
              \
              # 2. 安装 unrar: apt 优先，失败则从 RARLAB 下载 (仅 amd64 提供备用)
              (apt-get install -y --no-install-recommends unrar || ( \
                  echo "⚠️ apt 安装 unrar 失败，尝试从 RARLAB 下载..."; \
                  ARCH=$(dpkg --print-architecture); \
                  if [ "$ARCH" = "amd64" ]; then RAR_URL="http://www.rarlab.com/rar/rarlinux-x64-723.tar.gz"; \
                  else RAR_URL=""; fi; \
                  if [ -n "$RAR_URL" ]; then \
                      wget --no-check-certificate -q -O /tmp/rar.tar.gz "$RAR_URL" && \
                      tar -xzf /tmp/rar.tar.gz -C /tmp && \
                      cp /tmp/rar/unrar /usr/local/bin/ && chmod +x /usr/local/bin/unrar && \
                      rm -rf /tmp/rar*; \
                  fi \
              ) || true) && \
              \
              # 3. 安装 rar: 全架构尝试 apt 安装，失败则从 RARLAB 下载 (仅 amd64)
              (apt-get install -y --no-install-recommends rar || ( \
                  echo "⚠️ apt 安装 rar 失败，尝试从 RARLAB 下载..."; \
                  ARCH=$(dpkg --print-architecture); \
                  if [ "$ARCH" = "amd64" ]; then RAR_URL="http://www.rarlab.com/rar/rarlinux-x64-723.tar.gz"; \
                  else RAR_URL=""; fi; \
                  if [ -n "$RAR_URL" ]; then \
                      wget --no-check-certificate -q -O /tmp/rar.tar.gz "$RAR_URL" && \
                      tar -xzf /tmp/rar.tar.gz -C /tmp && \
                      cp /tmp/rar/rar /usr/local/bin/ && chmod +x /usr/local/bin/rar && \
                      rm -rf /tmp/rar*; \
                  fi \
              ) || true) && \
              \
              apt-get purge -y --auto-remove wget xz-utils && \
              rm -rf /var/lib/apt/lists/* && \
              ln -snf /usr/share/zoneinfo/${TZ} /etc/localtime && \
              echo ${TZ} > /etc/timezone

          COPY wzfilemanager-linux-${{ matrix.arch }} /opt/wzfilemanager/wzfilemanager
          RUN chmod +x /opt/wzfilemanager/wzfilemanager

          COPY start.sh /start.sh
          RUN chmod +x /start.sh

          EXPOSE 36688
          VOLUME ["/opt/wzfilemanager/data"]
          CMD ["/start.sh"]
          EOF

          # 直接将仓库根目录的 start.sh 复制到 binaries 目录，供 Docker 打包使用
          cp start.sh binaries/start.sh
          chmod +x binaries/start.sh

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push single-arch image
        uses: docker/build-push-action@v5
        with:
          context: ./binaries
          file: ./binaries/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.PROJECT }}:${{ env.CUSTOM_VERSION }}-${{ matrix.arch }}
            ${{ secrets.DOCKER_USERNAME }}/${{ env.PROJECT }}:latest-${{ matrix.arch }}
        continue-on-error: true

  # 任务 5：合并多架构镜像清单
  build-multi-arch-manifest:
    needs: [build-single-arch-docker]
    runs-on: ubuntu-latest
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create and push multi-arch manifest
        run: |
          docker buildx imagetools create -t ${{ secrets.DOCKER_USERNAME }}/${{ env.PROJECT }}:${{ env.CUSTOM_VERSION }} \
          -t ${{ secrets.DOCKER_USERNAME }}/${{ env.PROJECT }}:latest \
          ${{ secrets.DOCKER_USERNAME }}/${{ env.PROJECT }}:${{ env.CUSTOM_VERSION }}-amd64 \
          ${{ secrets.DOCKER_USERNAME }}/${{ env.PROJECT }}:${{ env.CUSTOM_VERSION }}-arm64 \
          ${{ secrets.DOCKER_USERNAME }}/${{ env.PROJECT }}:${{ env.CUSTOM_VERSION }}-armv7
        continue-on-error: true
