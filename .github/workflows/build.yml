name: Build, Package and Push Multi-Arch Docker

on:
  workflow_dispatch: # 允许在 GitHub 页面手动点击触发

jobs:
  # 任务 1：编译 Linux 多架构二进制文件
  build-linux-binary:
    runs-on: ubuntu-20.04
    strategy:
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
          - arch: arm64
            platform: linux/arm64
          - arch: armv7
            platform: linux/arm/v7
          - arch: i386
            platform: linux/386
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Compile binary in Ubuntu 20.04
        run: |
          echo "使用 Ubuntu 20.04 容器编译 ${{ matrix.arch }} 架构的二进制文件..."
          docker run --rm --platform ${{ matrix.platform }} -v ${{ github.workspace }}:/work -w /work ubuntu:20.04 bash -c "
            # 更新源并安装所需系统环境
            apt-get update
            apt-get install -y python3 python3-pip python3-venv zip tar rar p7zip-full p7zip-rar unrar openssh-server curl
            
            # 安装 Python 依赖 (包含 paramiko 和 pyinstaller)
            pip3 install --upgrade pip
            pip3 install -r requirements.txt
            pip3 install paramiko pyinstaller
            
            # 打包为单文件二进制 (将 web 和 config.json 打包进去)
            pyinstaller --onefile --add-data 'web:web' --add-data 'config.json:.' main.py
            
            # 重命名二进制文件
            mv dist/main wzfilemanager-linux-${{ matrix.arch }}
            chmod +x wzfilemanager-linux-${{ matrix.arch }}
          "

      - name: Upload binary artifact
        uses: actions/upload-artifact@v3
        with:
          name: binary-linux-${{ matrix.arch }}
          path: wzfilemanager-linux-${{ matrix.arch }}

  # 任务 2：编译 Windows .exe 文件
  build-windows-exe:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10' 

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install paramiko pyinstaller

      - name: Build .exe with PyInstaller
        # 注意：Windows 环境下 PyInstaller 的 --add-data 分隔符是分号 ';' 而不是冒号 ':'
        run: |
          pyinstaller --onefile --add-data "web;web" --add-data "config.json;." main.py
          mv dist/main.exe wzfilemanager-windows-amd64.exe

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v3
        with:
          name: binary-windows
          path: wzfilemanager-windows-amd64.exe

  # 任务 3：下载所有二进制并打包推送多架构 Docker 镜像
  build-and-push-docker:
    needs: [build-linux-binary, build-windows-exe]
    runs-on: ubuntu-20.04
    steps:
      - name: Download amd64 binary
        uses: actions/download-artifact@v3
        with: { name: binary-linux-amd64, path: binaries }

      - name: Download arm64 binary
        uses: actions/download-artifact@v3
        with: { name: binary-linux-arm64, path: binaries }

      - name: Download armv7 binary
        uses: actions/download-artifact@v3
        with: { name: binary-linux-armv7, path: binaries }

      - name: Download i386 binary
        uses: actions/download-artifact@v3
        with: { name: binary-linux-i386, path: binaries }

      - name: Prepare Docker context and Entrypoint
        run: |
          chmod +x binaries/wzfilemanager-linux-*
          
          # 创建一个智能入口脚本，根据 CPU 架构自动调用对应的二进制文件
          cat << 'EOF' > binaries/entrypoint.sh
          #!/bin/bash
          ARCH=$(uname -m)
          case "$ARCH" in
              x86_64)  BINARY="/app/wzfilemanager-linux-amd64" ;;
              aarch64) BINARY="/app/wzfilemanager-linux-arm64" ;;
              armv7l)  BINARY="/app/wzfilemanager-linux-armv7" ;;
              i386|i686) BINARY="/app/wzfilemanager-linux-i386" ;;
              *) echo "Unsupported architecture: $ARCH" && exit 1 ;;
          esac
          echo "Starting WzFileManager for $ARCH..."
          exec "$BINARY"
          EOF
          chmod +x binaries/entrypoint.sh

          # 生成 Dockerfile，固定暴露 36688 端口，并创建 logs 目录供映射
          cat << 'EOF' > Dockerfile
          FROM ubuntu:20.04
          WORKDIR /app
          COPY . /app/
          RUN chmod +x /app/wzfilemanager-linux-* /app/entrypoint.sh
          RUN mkdir -p /app/logs
          EXPOSE 36688
          ENTRYPOINT ["/app/entrypoint.sh"]
          EOF

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push multi-arch Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./binaries
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64,linux/arm/v7,linux/386
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/wzfilemanager:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/wzfilemanager:${{ github.run_number }}
        # 【关键修改】允许此步骤失败，即使 Docker 推送失败，也不影响上方已上传的二进制和 EXE 文件产出
        continue-on-error: true

      - name: Notify Docker push status
        if: failure()
        run: echo "⚠️ Docker 推送失败，但不影响已编译好的二进制文件。请前往 Artifacts 下载。"
