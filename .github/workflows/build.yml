name: Build Multi-Arch Binary

on:
  workflow_dispatch: # 允许在 GitHub 页面手动点击触发

env:
  PROJECT: wzfilemanager
  CUSTOM_VERSION: "1.0"

jobs:
  # 任务 1：编译 Linux 多架构二进制文件
  build-linux-binary:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # 关闭快速失败
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
          - arch: arm64
            platform: linux/arm64
          - arch: armv7
            platform: linux/arm/v7
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Compile binary in Ubuntu 22.04
        timeout-minutes: 30 # 增加 ARM 源码编译的容错时间
        run: |
          echo "使用 Ubuntu 22.04 容器编译 ${{ matrix.arch }} 架构的二进制文件..."
          docker run --rm --platform ${{ matrix.platform }} -e DEBIAN_FRONTEND=noninteractive -v ${{ github.workspace }}:/work -w /work ubuntu:22.04 bash -c "
            set -e
            apt-get update
            # 仅 amd64 架构安装 rar 包
            RAR_PKG=''
            if [ '${{ matrix.arch }}' = 'amd64' ]; then
              RAR_PKG='rar'
            fi
            
            # 加入 build-essential, libffi-dev, libssl-dev 解决 cffi/pynacl 源码编译报错
            apt-get install -y python3 python3-pip python3-venv zip tar p7zip-full unrar \$RAR_PKG curl build-essential libffi-dev libssl-dev
            
            # 创建并激活虚拟环境
            python3 -m venv venv
            source venv/bin/activate
            
            pip3 install --upgrade pip
            pip3 install --prefer-binary -r requirements.txt
            pip3 install --prefer-binary paramiko pyinstaller
            
            # 将 web, core 和 config.json 打包进二进制
            pyinstaller --onefile --add-data 'web:web' --add-data 'core:core' --add-data 'config.json:.' main.py
            
            mv dist/main wzfilemanager-linux-${{ matrix.arch }}
            chmod +x wzfilemanager-linux-${{ matrix.arch }}
          "

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-linux-${{ matrix.arch }}
          path: wzfilemanager-linux-${{ matrix.arch }}

  # 任务 2：编译 Windows (Win7/Win10, 32位/64位)
  build-windows-exe:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: win32
            python-arch: x86
          - arch: win64
            python-arch: x64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 使用 Python 3.8 以确保完美兼容 Windows 7
      - name: Set up Python 3.8
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'
          architecture: ${{ matrix.python-arch }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --prefer-binary -r requirements.txt
          pip install --prefer-binary paramiko pyinstaller

      - name: Build .exe with PyInstaller
        # 注意：Windows 环境下 PyInstaller 的 --add-data 分隔符是分号 ';' 而不是冒号 ':'
        run: |
          pyinstaller --onefile --add-data "web;web" --add-data "core;core" --add-data "config.json;." main.py
          mv dist/main.exe wzfilemanager-windows-${{ matrix.arch }}.exe

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-windows-${{ matrix.arch }}
          path: wzfilemanager-windows-${{ matrix.arch }}.exe

  # 任务 3：编译 macOS (仅 Apple Silicon M1/M2)
  build-macos-binary:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --prefer-binary -r requirements.txt
          pip install --prefer-binary paramiko pyinstaller

      - name: Build macOS binary with PyInstaller
        run: |
          pyinstaller --onefile --add-data="web:web" --add-data="core:core" --add-data="config.json:." main.py
          mv dist/main wzfilemanager-macos-arm64
          chmod +x wzfilemanager-macos-arm64

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-macos-arm64
          path: wzfilemanager-macos-arm64
