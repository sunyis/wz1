name: Build, Package and Push Multi-Arch Docker

on:
  workflow_dispatch: # 允许在 GitHub 页面手动点击触发

env:
  PROJECT: wzfilemanager
  CUSTOM_VERSION: "1.0"

jobs:
  # 任务 1：编译 Linux 多架构二进制文件
  build-linux-binary:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # 关闭快速失败
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
          - arch: arm64
            platform: linux/arm64
          - arch: armv7
            platform: linux/arm/v7
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Compile binary in Ubuntu 18.04
        timeout-minutes: 30
        run: |
          echo "使用 Ubuntu 18.04 容器编译 ${{ matrix.arch }} 架构的二进制文件..."
          # 【关键修改】使用 ubuntu:18.04 以兼容更老的系统
          docker run --rm --platform ${{ matrix.platform }} -e DEBIAN_FRONTEND=noninteractive -v ${{ github.workspace }}:/work -w /work ubuntu:18.04 bash -c "
            set -e
            apt-get update
            # 安装 software-properties-common 以使用 add-apt-repository
            apt-get install -y software-properties-common curl
            
            # 添加 deadsnakes PPA 源以安装 Python 3.8
            add-apt-repository -y ppa:deadsnakes/ppa
            apt-get update
            
            # 仅 amd64 架构安装 rar 包
            RAR_PKG=''
            if [ '${{ matrix.arch }}' = 'amd64' ]; then
              RAR_PKG='rar'
            fi
            
            # 安装 Python 3.8 及 C 编译依赖
            apt-get install -y python3.8 python3.8-venv python3.8-dev zip tar p7zip-full unrar \$RAR_PKG build-essential libffi-dev libssl-dev
            
            # 创建并激活虚拟环境
            python3.8 -m venv venv
            source venv/bin/activate
            
            pip3 install --upgrade pip
            pip3 install --prefer-binary -r requirements.txt
            pip3 install --prefer-binary paramiko pyinstaller
            
            pyinstaller --onefile --add-data 'web:web' --add-data 'core:core' --add-data 'config.json:.' main.py
            
            mv dist/main wzfilemanager-linux-${{ matrix.arch }}
            chmod +x wzfilemanager-linux-${{ matrix.arch }}
          "

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-linux-${{ matrix.arch }}
          path: wzfilemanager-linux-${{ matrix.arch }}

  # 任务 2：编译 Windows (Win7/Win10, 32位/64位)
  build-windows-exe:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: win32
            python-arch: x86
          - arch: win64
            python-arch: x64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.8
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'
          architecture: ${{ matrix.python-arch }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --prefer-binary -r requirements.txt
          pip install --prefer-binary paramiko pyinstaller

      - name: Build .exe with PyInstaller
        run: |
          pyinstaller --onefile --add-data "web;web" --add-data "core;core" --add-data "config.json;." main.py
          mv dist/main.exe wzfilemanager-windows-${{ matrix.arch }}.exe

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-windows-${{ matrix.arch }}
          path: wzfilemanager-windows-${{ matrix.arch }}.exe

  # 任务 3：编译 macOS (Intel 和 Apple Silicon)
  build-macos-binary:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: intel
            os: macos-13
          - arch: arm64
            os: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --prefer-binary -r requirements.txt
          pip install --prefer-binary paramiko pyinstaller

      - name: Build macOS binary with PyInstaller
        run: |
          pyinstaller --onefile --add-data="web:web" --add-data="core:core" --add-data="config.json:." main.py
          mv dist/main wzfilemanager-macos-${{ matrix.arch }}
          chmod +x wzfilemanager-macos-${{ matrix.arch }}

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-macos-${{ matrix.arch }}
          path: wzfilemanager-macos-${{ matrix.arch }}

  # 任务 4：下载 Linux 二进制并打包推送多架构 Docker 镜像
  build-and-push-docker:
    needs: [build-linux-binary, build-windows-exe, build-macos-binary]
    runs-on: ubuntu-latest
    steps:
      - name: Download amd64 binary
        uses: actions/download-artifact@v4
        with: { name: binary-linux-amd64, path: binaries }

      - name: Download arm64 binary
        uses: actions/download-artifact@v4
        with: { name: binary-linux-arm64, path: binaries }

      - name: Download armv7 binary
        uses: actions/download-artifact@v4
        with: { name: binary-linux-armv7, path: binaries }

      - name: Prepare Docker context and Entrypoint
        run: |
          chmod +x binaries/wzfilemanager-linux-*
          
          cat << 'EOF' > binaries/entrypoint.sh
          #!/bin/bash
          ARCH=$(uname -m)
          case "$ARCH" in
              x86_64)  BINARY="/app/wzfilemanager-linux-amd64" ;;
              aarch64) BINARY="/app/wzfilemanager-linux-arm64" ;;
              armv7l)  BINARY="/app/wzfilemanager-linux-armv7" ;;
              *) echo "Unsupported architecture: $ARCH" && exit 1 ;;
          esac
          echo "Starting WzFileManager for $ARCH..."
          exec "$BINARY"
          EOF
          chmod +x binaries/entrypoint.sh

          # 生成 Dockerfile，基础镜像为 18.04
          cat << 'EOF' > Dockerfile
          FROM ubuntu:18.04
          ENV DEBIAN_FRONTEND=noninteractive
          WORKDIR /app
          COPY . /app/
          
          # 18.04 自带 p7zip-full 提供 7z 命令，同时从官方下载全架构 rar
          RUN apt-get update && \
              apt-get install -y wget zip tar p7zip-full unrar --no-install-recommends && \
              \
              ARCH=$(dpkg --print-architecture) && \
              if [ "$ARCH" = "amd64" ]; then RAR_URL="https://www.rarlab.com/rar/rarlinux-x64-7.0.9.tar.gz"; \
              elif [ "$ARCH" = "arm64" ]; then RAR_URL="https://www.rarlab.com/rar/rarlinux-aarch64-7.0.9.tar.gz"; \
              elif [ "$ARCH" = "armhf" ]; then RAR_URL="https://www.rarlab.com/rar/rarlinux-arm-7.0.9.tar.gz"; \
              else RAR_URL=""; fi && \
              \
              if [ -n "$RAR_URL" ]; then \
                  wget -q -O /tmp/rar.tar.gz "$RAR_URL" && \
                  tar -xzf /tmp/rar.tar.gz -C /tmp && \
                  cp /tmp/rar/rar /usr/local/bin/ && \
                  cp /tmp/rar/unrar /usr/local/bin/ && \
                  chmod +x /usr/local/bin/rar /usr/local/bin/unrar && \
                  rm -rf /tmp/rar*; \
              fi && \
              \
              rm -rf /var/lib/apt/lists/*
              
          RUN chmod +x /app/wzfilemanager-linux-* /app/entrypoint.sh
          RUN mkdir -p /app/logs
          EXPOSE 36688
          ENTRYPOINT ["/app/entrypoint.sh"]
          EOF

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push multi-arch Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./binaries
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.PROJECT }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ env.PROJECT }}:${{ env.CUSTOM_VERSION }}
        continue-on-error: true

      - name: Notify Docker push status
        if: failure()
        run: echo "⚠️ Docker 推送失败，但不影响已编译好的二进制文件。请前往 Artifacts 下载。"